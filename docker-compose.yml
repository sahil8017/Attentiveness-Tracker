# ==========================================
# Attentiveness Tracker — Docker Compose
# FASTAPI (app) + POSTGRES (db) + NGINX (proxy)
# ==========================================

services:
  db:
    image: postgres:16-alpine
    container_name: attentiveness-db
    environment:
      POSTGRES_USER: attentiveness
      POSTGRES_PASSWORD: attentiveness_dev
      POSTGRES_DB: attentiveness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attentiveness"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attentiveness-app
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://attentiveness:attentiveness_dev@db:5432/attentiveness
      - DEBUG=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: attentiveness-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
