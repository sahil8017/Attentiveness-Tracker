# Render Blueprint — Attentiveness Tracker
# Deploy: https://render.com/deploy

databases:
  - name: attentiveness-db
    plan: free
    databaseName: attentiveness
    user: attentiveness

services:
  - type: web
    name: attentiveness-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attentiveness-db
          property: connectionString
      - key: ROBOFLOW_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: ROBOFLOW_PROJECT
        value: attention50k
      - key: ROBOFLOW_VERSION
        value: "3"
      - key: JWT_SECRET_KEY
        generateValue: true  # Render generates a random secret
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: CONFIDENCE_THRESHOLD
        value: "40"
      - key: BLUR_THRESHOLD
        value: "15.0"
      - key: SMOOTHING_WINDOW
        value: "5"
      - key: ALERT_CONSECUTIVE_FRAMES
        value: "3"
      - key: DEBUG
        value: "false"
