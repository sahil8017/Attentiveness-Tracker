<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Attentiveness Tracker</title>

    <link href="/static/css/tailwind.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/nav.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen flex flex-col">
    <!-- Minimal Nav -->
    <nav class="bg-white/80 dark:bg-zinc-950/80 backdrop-blur border-b border-gray-200/70 dark:border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <a href="/" class="flex items-center gap-3">
                    <span
                        class="h-9 w-9 rounded-xl bg-indigo-600/10 text-indigo-600 dark:text-indigo-300 flex items-center justify-center">
                        <i data-lucide="scan-face" class="h-5 w-5"></i>
                    </span>
                    <span class="text-lg font-semibold tracking-tight">Attentiveness Tracker</span>
                </a>
                <div class="flex items-center">
                    <button id="themeToggle"
                        class="h-10 w-10 rounded-full border border-gray-200 dark:border-white/10 bg-white/80 dark:bg-zinc-900/70 hover:bg-gray-100 dark:hover:bg-zinc-800/80 transition flex items-center justify-center">
                        <i data-lucide="sun" class="h-4 w-4 dark:hidden"></i>
                        <i data-lucide="moon" class="h-4 w-4 hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div
                class="bg-white dark:bg-zinc-900/60 border border-gray-200 dark:border-white/10 rounded-2xl p-8 shadow-sm">
                <div class="text-center mb-8">
                    <div
                        class="mx-auto w-14 h-14 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-300 flex items-center justify-center mb-4">
                        <i data-lucide="user-plus" class="h-6 w-6"></i>
                    </div>
                    <h2 class="text-2xl font-bold">Create account</h2>
                    <p class="text-gray-500 dark:text-zinc-400 text-sm mt-1">Start tracking your attentiveness</p>
                </div>

                <form id="registerForm" class="space-y-5">
                    <div>
                        <label for="email"
                            class="block text-sm font-medium text-gray-700 dark:text-zinc-300 mb-1.5">Email</label>
                        <input type="email" id="email" required autocomplete="email"
                            class="w-full bg-gray-50 dark:bg-zinc-900 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 outline-none transition"
                            placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password"
                            class="block text-sm font-medium text-gray-700 dark:text-zinc-300 mb-1.5">Password</label>
                        <input type="password" id="password" required autocomplete="new-password" minlength="6"
                            class="w-full bg-gray-50 dark:bg-zinc-900 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 outline-none transition"
                            placeholder="Min. 6 characters">
                    </div>
                    <div>
                        <label for="confirmPassword"
                            class="block text-sm font-medium text-gray-700 dark:text-zinc-300 mb-1.5">Confirm
                            password</label>
                        <input type="password" id="confirmPassword" required autocomplete="new-password"
                            class="w-full bg-gray-50 dark:bg-zinc-900 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 outline-none transition"
                            placeholder="••••••••">
                    </div>

                    <div id="errorMsg" class="text-rose-500 text-sm font-medium hidden"></div>

                    <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-semibold transition-all duration-200 shadow-sm hover:shadow-md hover:scale-[1.01] active:scale-[0.99]">
                        Create account
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 dark:text-zinc-400 mt-6">
                    Already have an account?
                    <a href="/login" class="text-indigo-600 dark:text-indigo-300 font-medium hover:underline">Sign
                        in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script>
        // If already logged in, redirect
        if (AUTH.isAuthenticated()) {
            window.location.href = '/detection';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.detail || 'Registration failed';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                // Auto-login after registration
                AUTH.setToken(data.access_token);
                AUTH.setUser({ id: data.user_id, email: data.email });
                window.location.href = '/detection';
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
