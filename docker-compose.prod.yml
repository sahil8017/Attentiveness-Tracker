# ==========================================
# Attentiveness Tracker — Docker Compose (Prod)
# With Nginx reverse proxy
# ==========================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attentiveness-app
    env_file:
      - .env
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    environment:
      - DATABASE_NAME=data/attentiveness.db
      - DEBUG=false
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:5000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: attentiveness-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always

volumes:
  app-data:
  app-logs:
